name: "Task 1 — Terraform Destroy (бонус)"

on:
  workflow_dispatch: # тільки ручний запуск — щоб не знищити випадково
    inputs:
      confirm:
        description: 'Введи "destroy" для підтвердження знищення ресурсів'
        required: true

jobs:
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    # Захист: виконується лише якщо введено правильне слово
    if: github.event.inputs.confirm == 'destroy'
    defaults:
      run:
        working-directory: task1/terraform

    env:
      TF_VAR_do_token:          ${{ secrets.DO_TOKEN }}
      TF_VAR_spaces_access_key: ${{ secrets.SPACES_ACCESS_KEY }}
      TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
      TF_VAR_ssh_public_key:    ${{ secrets.SSH_PUBLIC_KEY }}
      AWS_ACCESS_KEY_ID:        ${{ secrets.SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.SPACES_SECRET_KEY }}

    steps:
      - name: Checkout коду
        uses: actions/checkout@v4

      - name: Встановлення Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SPACES_SECRET_KEY }}"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
